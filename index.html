<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookski</title>
    <link  rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>BOOKSKI</h1>
    </div>
    <div class="book-container">
        
    </div>
    
        <button class="plus-icon" id="add-popup-button">+</button>
    
    <div class="overlay"></div>
    <div class="popup-box">
        <h2 style="display: inline;">Add Book</h2>
        <form>
            <input type="text" placeholder="Book Title"  id="book-title-input">
            <input type="text" placeholder="Author" id="author-input">
            <textarea placeholder="Description" id="description-input"></textarea>
        </form>
        <button id="add-button" style="font-size: 20px;"><b>ADD</b></button>
        <button id="cancel-button" style="font-size: 20px;"><b>CANCEL</b></button>
    </div>
    <script src="index.js"></script>
</body>
</html>
